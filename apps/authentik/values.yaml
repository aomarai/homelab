authentik:
  secret_key: ""
  error_reporting:
    enabled: false
  log_level: info
  postgresql:
    password: ""

global:
  env:
    - name: AUTHENTIK_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: secret_key
    - name: AUTHENTIK_POSTGRESQL__PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-secrets
          key: postgres_password
    - name: AUTHENTIK_REDIS__HOST
      value: authentik-redis

server:
  ingress:
    enabled: false
  env:
    - name: AUTHENTIK_HOST
      value: "https://auth.ashworks.net"
    - name: AUTHENTIK_HOST_BROWSER
      value: "https://auth.ashworks.net"

  resources:
    requests:
      memory: 512Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 500m

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 30s
      scrapeTimeout: 3s

worker:
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 250m

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 30s
      scrapeTimeout: 3s

postgresql:
  enabled: true
  auth:
    existingSecret: authentik-secrets
    secretKeys:
      adminPasswordKey: postgres_password
      userPasswordKey: postgres_password