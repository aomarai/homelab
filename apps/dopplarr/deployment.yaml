apiVersion: apps/v1
kind: Deployment
metadata:
  name: doplarr
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: doplarr
  template:
    metadata:
      labels:
        app: doplarr
    spec:
      containers:
        - name: doplarr
          image: ghcr.io/kiranshila/doplarr:latest
          env:
            - name: TZ
              value: America/Chicago
            - name: DISCORD__TOKEN
              valueFrom:
                secretKeyRef:
                  name: discord-token
                  key: DISCORD__TOKEN
            - name: OVERSEERR__API
              valueFrom:
                secretKeyRef:
                  name: seerr-token
                  key: SEERR__API
            - name: OVERSEERR__URL
              value: http://seerr.media.svc.cluster.local:5055
            - name: DISCORD__MAX_RESULTS
              value: "25"
            - name: PARTIAL_SEASONS
              value: "true"
            - name: LOG_LEVEL
              value: ":info"
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 200m