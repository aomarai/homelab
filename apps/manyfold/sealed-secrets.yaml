---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: key-base
  namespace: manyfold
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  encryptedData:
    SECRET_KEY_BASE: 
  template:
    metadata:
      name: key-base
      namespace: manyfold
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: postgresql-credentials
  namespace: manyfold
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  encryptedData:
    POSTGRES_PASSWORD: 
    POSTGRES_USER: 
  template:
    metadata:
      name: postgresql-credentials
      namespace: manyfold

