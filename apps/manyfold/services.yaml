# ClusterIP for Traefik HTTPRoute (HTTP + WebSocket)
apiVersion: v1
kind: Service
metadata:
  name: manyfold
  namespace: manyfold
spec:
  selector:
    app: manyfold
  ports:
    - name: http
      port: 3214
      targetPort: 3214
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: manyfold
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: manyfold
spec:
  selector:
    app: postgresql
  ports:
    - port: 5432
      targetPort: 5432