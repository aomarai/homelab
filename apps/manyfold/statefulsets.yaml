apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: manyfold
  namespace: manyfold
spec:
  replicas: 0
  serviceName: "manyfold"
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: manyfold
  template:
    metadata:
      labels:
        app: manyfold
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - name: manyfold
          image: ghcr.io/manyfold3d/manyfold:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3214
              protocol: TCP
              name: http
          env:
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: key-base
                  key: SECRET_KEY_BASE
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgres://$(DB_USER):$(DB_PASSWORD)@postgresql:5432/manyfold
            - name: REDIS_URL
              value: redis://redis:6379/1
          resources:
            requests:
              memory: 512Mi
              cpu: 50m
            limits:
              memory: 3Gi
              cpu: 2
          volumeMounts:
            - name: data
              mountPath: /app/data
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: longhorn
      resources:
        requests:
          storage: 20Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: manyfold
spec:
  serviceName: "postgresql"
  replicas: 0
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
      - name: postgresql
        image: postgres:17
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgresql-credentials
              key: POSTGRES_PASSWORD
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgresql-credentials
              key: POSTGRES_USER
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: postgresql-storage 
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates: 
  - metadata:
      name: postgresql-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: longhorn
      resources:
        requests:
          storage: 3Gi