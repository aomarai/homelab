apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: manyfold
  namespace: manyfold
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: manyfold
  template:
    metadata:
      labels:
        app: manyfold
    spec:
      containers:
        - name: manyfold
          image: ghcr.io/manyfold3d/manyfold:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3214
              protocol: TCP
              name: http
          env:
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: key-base
                  key: SECRET_KEY_BASE
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 2Gi
              cpu: 2
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: manyfold-data
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: manyfold
  labels:
    app: postgresql
spec:
  serviceName: "postgresql"
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
      - name: postgresql
        image: postgres:18
        ports:
        - containerPort: 5432
          name: postgresql
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgresql-credentials
              key: POSTGRES_PASSWORD
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgresql-credentials
              key: POSTGRES_USER
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: postgresql-storage
          mountPath: /var/lib/postgresql/data