server:
  extraSecretEnvironmentVars:
    - envName: VAULT_TOKEN
      secretName: transit-token
      secretKey: TRANSIT_TOKEN

  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true
        listener "tcp" {
          tls_disable = 1
          address = "[::]:8200"
          cluster_address = "[::]:8201"
        }
        storage "raft" {
          path = "/vault/data"
        }
        service_registration "kubernetes" {}
        
        seal "transit" {
          address         = "http://192.168.1.18:8200"
          key_name        = "baremetal-unseal-key"
          mount_path      = "transit/"
          tls_skip_verify = "true"
        }
  affinity: |
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: vault
                component: server
            topologyKey: kubernetes.io/hostname
  dataStorage:
    enabled: true
    size: 1.5Gi
    storageClass: longhorn
ui:
  enabled: true
injector:
  enabled: false
