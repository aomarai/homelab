orchestrator:
  replicaCount: 1
  env:
    TZ: America/Chicago
    PLEX_SERVER_PORT: "32400"
    LISTENING_PORT: "3500"
    WORKER_SELECTION_STRATEGY: "LOAD_RANK"
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m

worker:
  replicaCount: 2
  nodeSelector:
    intel.feature.node.kubernetes.io/gpu: "true"
  env:
    TZ: America/Chicago
    LISTENING_PORT: "3501"
    STAT_CPU_THRESHOLD: "50"
  resources:
    requests:
      memory: 512Mi
      cpu: 500m
    limits:
      memory: 2Gi
      cpu: 2000m
      gpu.intel.com/i915: "1"
  volumeMounts:
    - name: media
      mountPath: /media
  volumes:
    - name: media
      persistentVolumeClaim:
        claimName: media-nfs

plex:
  enabled: true
  env:
    TZ: America/Chicago
    PUID: "99"
    PGID: "100"
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 4Gi
      cpu: 2000m
  volumeMounts:
    - name: media
      mountPath: /media
    - name: config
      mountPath: /config
  volumes:
    - name: media
      persistentVolumeClaim:
        claimName: media-nfs
    - name: config
      persistentVolumeClaim:
        claimName: plex-config