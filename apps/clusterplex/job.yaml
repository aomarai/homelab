apiVersion: batch/v1
kind: Job
metadata:
  name: clusterplex-worker-dri-patch
  namespace: media
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      serviceAccountName: clusterplex-worker-patch-sa
      restartPolicy: OnFailure
      containers:
        - name: kubectl
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              kubectl patch statefulset clusterplex-worker -n media --type=json -p='[
                {
                  "op": "add",
                  "path": "/spec/template/spec/volumes/-",
                  "value": {
                    "name": "dri",
                    "hostPath": {
                      "path": "/dev/dri",
                      "type": "Directory"
                    }
                  }
                },
                {
                  "op": "add",
                  "path": "/spec/template/spec/containers/0/volumeMounts/-",
                  "value": {
                    "name": "dri",
                    "mountPath": "/dev/dri"
                  }
                }
              ]'
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: clusterplex-worker-patch-sa
  namespace: media
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: clusterplex-worker-patch-role
  namespace: media
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: clusterplex-worker-patch-binding
  namespace: media
subjects:
  - kind: ServiceAccount
    name: clusterplex-worker-patch-sa
    namespace: media
roleRef:
  kind: Role
  name: clusterplex-worker-patch-role
  apiGroup: rbac.authorization.k8s.io