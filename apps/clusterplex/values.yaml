global:
  plexImage:
    tag: latest
    imagePullPolicy: IfNotPresent
  timezone: America/Chicago

  sharedStorage:
    transcode:
      enabled: true
      storageClass: longhorn
      size: 20Gi
    media:
      enabled: true
      storageClass: "-"
      existingClaim: media-nfs

pms:
  enabled: true
  securityContext:
    privileged: true            # required for iGPU access
  env:
    PUID: "99"
    PGID: "100"
    VERSION: docker
    DOCKER_MODS: ghcr.io/pabloromeo/clusterplex_dockermod:latest
    TRANSCODE_OPERATING_MODE: remote
    TRANSCODER_VERBOSE: "1"
    LOCAL_RELAY_ENABLED: "1"
    LOCAL_RELAY_PORT: "32499"
    PLEX_CLAIM: ""              # get from plex.tv/claim, only needed on first run
  resources:
    requests:
      memory: 256Mi
      cpu: 500m
    limits:
      memory: 2Gi
      cpu: 2000m
  configVolume:
    enabled: true
    storageClass: longhorn
    size: 10Gi
  serviceConfig:
    type: LoadBalancer

orchestrator:
  enabled: true
  env:
    TZ: America/Chicago
    LISTENING_PORT: "3500"
    WORKER_SELECTION_STRATEGY: LOAD_RANK
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m

worker:
  enabled: true
  replicaCount: 2
  nodeSelector:
    intel.feature.node.kubernetes.io/gpu: "true"
  env:
    TZ: America/Chicago
    PUID: "99"
    PGID: "100"
    VERSION: docker
    DOCKER_MODS: ghcr.io/pabloromeo/clusterplex_worker_dockermod:latest
    LISTENING_PORT: "3501"
    STAT_CPU_INTERVAL: "10000"
    EAE_SUPPORT: "1"
    FFMPEG_HWACCEL: vaapi      # enables Intel QSV hardware transcoding
  resources:
    requests:
      memory: 128Mi
      cpu: 500m
    limits:
      memory: 2Gi
      gpu.intel.com/i915: "1"
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule