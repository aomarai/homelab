apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: bookshelf
  namespace: media
spec:
  replicas: 1
  serviceName: bookshelf
  selector:
    matchLabels:
      app: bookshelf
  template:
    metadata:
      labels:
        app: bookshelf
    spec:
      containers:
        - name: bookshelf
          image: ghcr.io/pennydreadful/bookshelf:hardcover
          env:
            - name: PUID
              value: "99"       # match Unraid nobody user
            - name: PGID
              value: "100"      # match Unraid users group
            - name: TZ
              value: America/Chicago
          ports:
            - containerPort: 8787
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: ebook-nfs
  volumeClaimTemplates:
    - metadata:
        name: config
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 1Gi