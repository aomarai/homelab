# harbor-values.yaml

expose:
  type: clusterIP
  tls:
    enabled: false
  ingress:
    hosts:
      core: harbor.homelab.local

externalURL: https://harbor.homelab.local

persistence:
  enabled: true
  resourcePolicy: "keep"
  persistentVolumeClaim:
    registry:
      storageClass: longhorn
      size: 50Gi
    jobservice:
      storageClass: longhorn
      size: 1Gi
    database:
      storageClass: longhorn
      size: 5Gi
    redis:
      storageClass: longhorn
      size: 2Gi
    trivy:
      storageClass: longhorn
      size: 5Gi

harborAdminPassword: "changeme"  # pull from Vault/Sealed Secret

# Proxy cache is the core feature you want
proxy:
  httpProxy: ""
  httpsProxy: ""
  noProxy: "127.0.0.1,localhost,.local,.internal"
  components:
    - core
    - jobservice
    - trivy

trivy:
  enabled: true   # optional but nice for vuln scanning on pull-through

notary:
  enabled: false  # skip unless you need image signing

chartmuseum:
  enabled: false  # skip unless you want to host Helm charts too

# Resource tuning for homelab
portal:
  replicas: 2

core:
  replicas: 2
  resources:
    requests:
      memory: 256Mi
      cpu: 100m

jobservice:
  replicas: 2
  resources:
    requests:
      memory: 128Mi
      cpu: 50m

registry:
  replicas: 2
  resources:
    requests:
      memory: 128Mi
      cpu: 50m