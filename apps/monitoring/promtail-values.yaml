config:
  clients:
    - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push

  snippets:
    pipelineStages:
      - match:
          selector: '{namespace!=""}'
          stages:
            - json:
                expressions:
                  level: level
                  lvl: lvl
                  severity: severity
            - labels:
                level:
                lvl:
                severity:
            - regex:
                expression: '(?i)(?P<log_level>debug|info|warn(?:ing)?|error|fatal|critical)'
            - labels:
                log_level:

      # Drop health check noise cluster-wide
      - drop:
          expression: '(?i)(GET /health|GET /ready|GET /live|readiness|liveness)'
          drop_counter_reason: health_check

      # Drop Longhorn noise
      - drop:
          selector: '{namespace="longhorn-system"}'
          expression: '(?i)(websocket|ping|pong)'
          drop_counter_reason: longhorn_noise

serviceMonitor:
  enabled: true
  labels:
    release: kube-prometheus-stack    # makes Prometheus scrape Promtail metrics

resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 128Mi
    cpu: 100m

# Tolerations so Promtail runs on master nodes too
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule