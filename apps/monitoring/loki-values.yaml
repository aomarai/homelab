deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  limits_config:
    retention_period: 168h
    ingestion_rate_mb: 8
    ingestion_burst_size_mb: 16
  compactor:
    retention_enabled: true
    compaction_interval: 10m
    delete_request_store: filesystem
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClassName: longhorn
    size: 10Gi

read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

chunksCache:
  enabled: false
resultsCache:
  enabled: false

lokiCanary:
  enabled: true

# Self-monitoring so you can see Loki's own metrics in Grafana
monitoring:
  selfMonitoring:
    enabled: false
  serviceMonitor:
    enabled: true     # scrape Loki metrics into Prometheus
    labels:
      release: kube-prometheus-stack