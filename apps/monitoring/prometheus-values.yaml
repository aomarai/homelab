prometheusOperator:
  admissionWebhooks:
    patch:
      enabled: false
    certManager:
      enabled: true

prometheus:
  prometheusSpec:
    retention: 7d
    retentionSize: 8GB
    resources:
      requests:
        memory: 512Mi
        cpu: 250m
      limits:
        memory: 1024Mi
        cpu: 500m
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

  additionalPrometheusRulesMap:
    homelab-rules:
      groups:
        - name: homelab.rules
          rules:
            - alert: PodCrashLooping
              expr: rate(kube_pod_container_status_restarts_total[15m]) * 60 * 5 > 0
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
                description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is restarting frequently."

            - alert: NodeDown
              expr: up{job="node-exporter"} == 0
              for: 2m
              labels:
                severity: critical
              annotations:
                summary: "Node {{ $labels.instance }} is down"
                description: "Node {{ $labels.instance }} has been unreachable for more than 2 minutes."

grafana:
  admin:
    existingSecret: grafana-credentials
    userKey: adminUser
    passwordKey: adminPassword
  deploymentStrategy:
    type: Recreate
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m
  persistence:
    enabled: true
    storageClassName: longhorn
    size: 5Gi
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false
      jsonData:
        maxLines: 1000
        derivedFields:
          - name: TraceID
            matcherRegex: '(?:trace_id|traceID)=(\w+)'
            url: '$${__value.raw}'

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: 64Mi
        cpu: 50m
      limits:
        memory: 128Mi
        cpu: 100m
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
  config:
    global:
      resolve_timeout: 5m
    templates: []
    route:
      group_by: ['namespace', 'alertname']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: discord
      routes:
        - matchers:
            - alertname = "Watchdog"
          receiver: blackhole
        - matchers:
            - alertname = "InfoInhibitor"
          receiver: blackhole
    receivers:
      - name: blackhole
      - name: discord
        webhook_configs:
          - url_secret:
              name: alertmanager-discord
              key: webhook-url
            send_resolved: true
    inhibit_rules:
      - equal: [namespace, alertname]
        source_matchers:
          - severity = critical
        target_matchers:
          - severity =~ warning|info
      - equal: [namespace, alertname]
        source_matchers:
          - severity = warning
        target_matchers:
          - severity = info
      - equal: [namespace]
        source_matchers:
          - alertname = InfoInhibitor
        target_matchers:
          - severity = info
      - target_matchers:
          - alertname = InfoInhibitor