prometheusOperator:
  admissionWebhooks:
    patch:
      enabled: false
    certManager:
      enabled: true

prometheus:
  prometheusSpec:
    retention: 7d
    retentionSize: 8GB
    resources:
      requests:
        memory: 512Mi
        cpu: 250m
      limits:
        memory: 1024Mi
        cpu: 500m
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

  additionalPrometheusRulesMap:
    homelab-rules:
      groups:
        - name: homelab.rules
          rules:
            - alert: PodCrashLooping
              expr: rate(kube_pod_container_status_restarts_total[15m]) * 60 * 5 > 0
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
                description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is restarting frequently."

            - alert: NodeDown
              expr: up{job="node-exporter"} == 0
              for: 2m
              labels:
                severity: critical
              annotations:
                summary: "Node {{ $labels.instance }} is down"
                description: "Node {{ $labels.instance }} has been unreachable for more than 2 minutes."

grafana:
  admin:
    existingSecret: grafana-credentials
    userKey: adminUser
    passwordKey: adminPassword
  deploymentStrategy:
    type: Recreate
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m
  persistence:
    enabled: true
    storageClassName: longhorn
    size: 5Gi

  # Sidecar picks up dashboard ConfigMaps automatically
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL    # look in all namespaces
    datasources:
      enabled: true

  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false
      jsonData:
        maxLines: 5000
        timeout: 60
        derivedFields:
          - name: TraceID
            matcherRegex: '(?:trace_id|traceID)=(\w+)'
            url: '$${__value.raw}'

  # Import community dashboards by ID
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      # Loki & Promtail overview
      loki-logs:
        gnetId: 13639
        revision: 2
        datasource: Loki
      # Kubernetes cluster logs
      kubernetes-logs:
        gnetId: 15141
        revision: 1
        datasource: Loki
      # Promtail metrics
      promtail-metrics:
        gnetId: 15140
        revision: 1
        datasource: Prometheus

alertmanager:
  alertmanagerSpec:
    configSecret: alertmanager-config-discord
    resources:
      requests:
        memory: 64Mi
        cpu: 50m
      limits:
        memory: 128Mi
        cpu: 100m
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
