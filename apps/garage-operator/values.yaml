apiVersion: garage.rajsingh.info/v1beta2
kind: GarageCluster
metadata:
  labels:
    app.kubernetes.io/name: garage-operator
    app.kubernetes.io/managed-by: kustomize
  name: garage
  namespace: garage-system
spec:
  image: dxflrs/garage:v2.3.0

  replication:
    factor: 3
    consistencyMode: consistent

  # Storage tier — long-lived StatefulSet with PVCs.
  storage:
    replicas: 3
    metadata:
      size: 10Gi
    data:
      size: 75Gi
    # PVC retention policy — controls what happens to PVCs on delete/scale-down.
    pvcRetentionPolicy:
      whenDeleted: Delete
      whenScaled: Delete
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi

  # Gateway tier — ephemeral Deployment, EmptyDir for both metadata and data.
  # Pod node IDs rotate per pod restart; the operator garbage-collects stale
  # layout entries via tombstone cleanup.
  gateway:
    replicas: 2
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi

  network:
    rpcBindPort: 3901
    service:
      type: ClusterIP

  s3Api:
    bindPort: 3900
    region: garage

  # Website hosting — enabled by default with rootDomain ".<name>.<namespace>.svc"
  # webApi:
  #   rootDomain: ".garage.homelab.local"

  admin:
    bindPort: 3903

  database:
    engine: lmdb