global:
  hosts:
    domain: ashworks.net
    gitlab:
      name: gitlab.ashworks.net

  # --- External PostgreSQL Configuration ---
  psql:
    host: postgresql
    port: 5432
    database: gitlabhq_production
    username:
      secret: postgresql-credentials
      key: POSTGRES_USER
    password:
      secret: postgresql-credentials
      key: POSTGRES_PASSWORD

  # --- External Redis Configuration ---
  redis:
    host: redis
    port: 6379

  # --- Type-Specific Object Storage Configurations ---
  appConfig:
    artifacts:
      enabled: true
      bucket: gitlab
      connection:
        secret: gitlab-storage-connection
        key: connection
    uploads:
      enabled: true
      bucket: gitlab
      connection:
        secret: gitlab-storage-connection
        key: connection
    
    # Combined flat and nested structure to satisfy the NOTES.txt regex check
    backups:
      bucket: gitlab
      objectStorage:
        backend: s3
      connection:
        secret: gitlab-storage-connection
        key: connection
        
    packages:
      enabled: true
      bucket: gitlab
      connection:
        secret: gitlab-storage-connection
        key: connection
    lfs:
      enabled: true
      bucket: gitlab
      connection:
        secret: gitlab-storage-connection
        key: connection

  # Disable internal certificate helpers since you run Traefik
  gatewayApi:
    configureCertmanager: false
  ingress:
    configureCertmanager: false

# --- Container Registry Configuration ---
registry:
  enabled: true
  bucket: gitlab
  storage:
    secret: gitlab-storage-connection
    key: connection

# --- External Sub-chart Disables ---
postgresql:
  install: false

redis:
  install: false

installCertmanager: false

certmanager-issuer:
  install: false

nginx-ingress:
  enabled: false